components:
  schemas:
    Usuario:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        nome:
          type: string
          example: João Silva
        email:
          type: string
          example: joao@email.com

    UsuarioRequest:
      type: object
      required:
        - nome
        - email
      properties:
        nome:
          type: string
          example: João Silva
        email:
          type: string
          example: joao@email.com